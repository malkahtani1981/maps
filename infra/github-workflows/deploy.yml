name: Build & Deploy (Ansible)

on:
  push:
    branches: [main]
    paths-ignore: ["infra/terraform/**", "docs/**", "**.md"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Check whether the API service exists yet
        id: api_check
        run: |
          if [ -f api/Dockerfile ]; then echo "exists=true" >> "$GITHUB_OUTPUT"; else echo "exists=false" >> "$GITHUB_OUTPUT"; fi

      # Hard gate once ./api exists: a failed build fails the pipeline (no stale deploys).
      - name: Build & push API image
        if: steps.api_check.outputs.exists == 'true'
        uses: docker/build-push-action@v6
        with:
          context: . # repo root so data/alula-roads.json can be baked into the image
          file: api/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/maps-api:latest

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pipx install ansible-core && ansible-galaxy collection install community.docker

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/maps_deploy
          chmod 600 ~/.ssh/maps_deploy

      - name: Write inventory
        working-directory: infra/ansible
        run: |
          cat > inventory.ini <<EOF
          [presenting]
          ${{ secrets.PRESENTING_HOST }}
          [processing]
          ${{ secrets.PROCESSING_HOST }}
          [all:vars]
          ansible_user=root
          ansible_ssh_private_key_file=~/.ssh/maps_deploy
          EOF

      - name: Run playbook
        working-directory: infra/ansible
        run: |
          ansible-playbook site.yml \
            --extra-vars "postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            --extra-vars "presenting_ip=${{ secrets.PRESENTING_HOST }} processing_ip=${{ secrets.PROCESSING_HOST }}" \
            --extra-vars "domain=${{ vars.DOMAIN }}" \
            --extra-vars "ghcr_username=${{ github.repository_owner }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"
