name: Build & Deploy (Ansible)

on:
  push:
    branches: [main]
    paths-ignore: ["infra/terraform/**", "docs/**", "**.md"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Adjust context/dockerfile once the API service lands in this repo.
      - name: Build & push API image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/maps-api:latest
        continue-on-error: true # remove once ./api exists

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pipx install ansible-core && ansible-galaxy collection install community.docker

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}" > ~/.ssh/maps_deploy
          chmod 600 ~/.ssh/maps_deploy

      - name: Write inventory
        working-directory: infra/ansible
        run: |
          cat > inventory.ini <<EOF
          [app]
          ${{ secrets.APP_HOST }}
          [data]
          ${{ secrets.DATA_HOST }}
          [all:vars]
          ansible_user=ubuntu
          ansible_ssh_private_key_file=~/.ssh/maps_deploy
          EOF

      - name: Run playbook
        working-directory: infra/ansible
        run: |
          ansible-playbook site.yml \
            --extra-vars "postgres_password=${{ secrets.POSTGRES_PASSWORD }}" \
            --extra-vars "app_ip=${{ secrets.APP_HOST }} data_ip=${{ secrets.DATA_HOST }}" \
            --extra-vars "domain=${{ vars.DOMAIN }}" \
            --extra-vars "ghcr_username=${{ github.repository_owner }} ghcr_token=${{ secrets.GITHUB_TOKEN }}"
