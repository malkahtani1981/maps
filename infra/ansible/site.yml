---
# Full provisioning: hardening + Docker on all hosts, then role-specific stacks.
# Usage:
#   ansible-playbook site.yml                       # everything
#   ansible-playbook site.yml --tags presenting     # presenting VM only
#   ansible-playbook site.yml --tags deploy         # redeploy presenting containers only

- name: Common hardening & Docker
  hosts: all
  become: true
  roles:
    - common
    - docker
  tags: [base]

- name: Graph-processing VM — PostgreSQL + pgRouting + Memgraph
  hosts: processing
  become: true
  roles:
    - processing_stack
  tags: [processing]

- name: Graph-presenting VM — API + Redis + GraphHopper + Caddy (TLS)
  hosts: presenting
  become: true
  roles:
    - presenting_stack
  tags: [presenting, deploy]
