---
- name: UFW — allow Postgres & Bolt from app VM only
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ app_ip }}"
  loop: ["5432", "7687"]

- name: Create stack directory
  file:
    path: /opt/maps/data
    state: directory
    owner: ubuntu

- name: Render docker-compose for data stack
  template:
    src: docker-compose.yml.j2
    dest: /opt/maps/data/docker-compose.yml
    owner: ubuntu
  notify: restart data stack

- name: Start data stack
  community.docker.docker_compose_v2:
    project_src: /opt/maps/data
    state: present

- name: Nightly pg_dump backup cron
  cron:
    name: pg_backup
    user: ubuntu
    hour: "2"
    minute: "30"
    job: >
      docker exec maps-postgres pg_dump -U maps maps
      | gzip > /opt/maps/backups/maps-$(date +\%F).sql.gz
      && find /opt/maps/backups -name '*.sql.gz' -mtime +7 -delete

- name: Backup dir
  file:
    path: /opt/maps/backups
    state: directory
    owner: ubuntu
