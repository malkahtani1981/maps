---
- name: UFW — allow Postgres, Bolt & Kafka from presenting VM only
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
    src: "{{ presenting_ip }}"
  loop: ["5432", "7687", "9092"]

- name: Create stack directory
  file:
    path: /opt/maps/processing
    state: directory
    owner: root

- name: Render docker-compose for processing stack
  template:
    src: docker-compose.yml.j2
    dest: /opt/maps/processing/docker-compose.yml
    owner: root
  notify: restart processing stack

- name: Start processing stack
  community.docker.docker_compose_v2:
    project_src: /opt/maps/processing
    state: present

- name: Nightly pg_dump backup cron
  cron:
    name: pg_backup
    user: root
    hour: "2"
    minute: "30"
    job: >
      docker exec maps-postgres pg_dump -U maps maps
      | gzip > /opt/maps/backups/maps-$(date +\%F).sql.gz
      && find /opt/maps/backups -name '*.sql.gz' -mtime +7 -delete

- name: Backup dir
  file:
    path: /opt/maps/backups
    state: directory
    owner: root
