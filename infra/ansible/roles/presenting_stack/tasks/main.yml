---
- name: UFW — allow HTTP/HTTPS
  ufw:
    rule: allow
    port: "{{ item }}"
    proto: tcp
  loop: ["80", "443"]

- name: Create stack directory
  file:
    path: /opt/maps/presenting
    state: directory
    owner: root

- name: Render docker-compose for presenting stack
  template:
    src: docker-compose.yml.j2
    dest: /opt/maps/presenting/docker-compose.yml
    owner: root
  notify: restart presenting stack

- name: Render Caddyfile (automatic TLS)
  template:
    src: Caddyfile.j2
    dest: /opt/maps/presenting/Caddyfile
    owner: root
  notify: restart presenting stack

- name: Log in to GitHub Container Registry
  community.docker.docker_login:
    registry_url: ghcr.io
    username: "{{ ghcr_username }}"
    password: "{{ ghcr_token }}"
  when: ghcr_token is defined

- name: Pull latest images & start presenting stack
  community.docker.docker_compose_v2:
    project_src: /opt/maps/presenting
    state: present
    pull: always
