---
- name: Install Docker via convenience script
  shell: curl -fsSL https://get.docker.com | sh
  args:
    creates: /usr/bin/docker

- name: Ensure docker service is running
  service:
    name: docker
    state: started
    enabled: true

- name: Add root user to docker group
  user:
    name: root
    groups: docker
    append: true
