<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Graph Maps — Al Ula Routing Lab</title>
  <link href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" rel="stylesheet" />
  <style>
    :root {
      --bg: #101418; --panel: #1a2028; --line: #2a3341; --text: #e8edf3;
      --muted: #8b98a8; --accent: #e8a33d; --accent2: #4fa3ff;
    }
    * { box-sizing: border-box; margin: 0; }
    body { font-family: ui-sans-serif, system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header { padding: 10px 16px; border-bottom: 1px solid var(--line); display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    header h1 span { color: var(--accent); }
    header p { font-size: 12px; color: var(--muted); }
    #wrap { flex: 1; display: flex; min-height: 0; }
    #map { flex: 1; }
    aside { width: 300px; border-left: 1px solid var(--line); background: var(--panel); padding: 14px; overflow-y: auto; display: flex; flex-direction: column; gap: 14px; }
    aside h2 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 6px; }
    .hint { font-size: 12.5px; color: var(--muted); line-height: 1.5; }
    select, button { width: 100%; padding: 8px 10px; border-radius: 6px; border: 1px solid var(--line); background: #12171e; color: var(--text); font-size: 13px; }
    button { cursor: pointer; background: var(--accent); color: #14100a; font-weight: 600; border: none; }
    button:disabled { opacity: 0.4; cursor: default; }
    button.secondary { background: #232c38; color: var(--text); font-weight: 500; }
    .row { display: flex; gap: 8px; }
    table { width: 100%; font-size: 12.5px; border-collapse: collapse; }
    td { padding: 4px 0; border-bottom: 1px solid var(--line); }
    td:last-child { text-align: right; font-variant-numeric: tabular-nums; color: var(--accent); }
    .engines div { font-size: 12px; padding: 3px 0; color: var(--muted); }
    .engines b { color: var(--text); font-weight: 500; }
    .dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; margin-right: 6px; }
    .on { background: #43d17c; } .off { background: #5a6675; }
    #status { font-size: 12px; color: var(--accent2); min-height: 16px; }
    @media (max-width: 700px) { #wrap { flex-direction: column; } aside { width: 100%; border-left: none; border-top: 1px solid var(--line); } }
  </style>
</head>
<body>
  <header>
    <h1>GRAPH MAPS <span>/ Al Ula Routing Lab</span></h1>
    <p>Educational graph processing on real OSM data — click two points on the map to route between them.</p>
  </header>
  <div id="wrap">
    <div id="map"></div>
    <aside>
      <section>
        <h2>Engine</h2>
        <select id="engine">
          <option value="memory">memory — in-process graph</option>
          <option value="pgrouting">pgrouting — PostGIS SQL</option>
          <option value="graphhopper">graphhopper — Contraction Hierarchies</option>
        </select>
        <div style="height:8px"></div>
        <select id="algorithm">
          <option value="astar">A* (heuristic, explores less)</option>
          <option value="dijkstra">Dijkstra (uniform exploration)</option>
        </select>
      </section>
      <section class="row">
        <button id="routeBtn" disabled>Route</button>
        <button id="clearBtn" class="secondary">Clear</button>
      </section>
      <div id="status"></div>
      <section>
        <h2>Result</h2>
        <table id="result"><tr><td colspan="2" class="hint">Pick two points, then Route. Route the same pair twice to see the cache hit.</td></tr></table>
      </section>
      <section>
        <h2>Graph</h2>
        <table id="stats"></table>
      </section>
      <section>
        <h2>Engines available</h2>
        <div class="engines" id="engines"></div>
      </section>
    </aside>
  </div>
  <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
  <script>
    // Works both when the page is served at / (api at ./api/) and when the
    // whole app sits behind an /api prefix (Replit preview proxy).
    const API = location.pathname.replace(/\/+$/, "").endsWith("/api") ? "." : "api";

    // Panels load independently of the map, so API data shows even if the
    // MapLibre CDN script is unavailable.
    fetch(`${API}/graph/stats`).then((r) => r.json()).then((s) => {
      document.getElementById("stats").innerHTML =
        `<tr><td>OSM ways</td><td>${s.ways.toLocaleString()}</td></tr>
         <tr><td>Graph nodes</td><td>${s.nodes.toLocaleString()}</td></tr>
         <tr><td>Directed edges</td><td>${s.directedEdges.toLocaleString()}</td></tr>`;
    });
    fetch(`${API}/engines`).then((r) => r.json()).then(({ engines }) => {
      document.getElementById("engines").innerHTML = engines.map((e) =>
        `<div><span class="dot ${e.available ? "on" : "off"}"></span><b>${e.name}</b> — ${e.detail}</div>`).join("");
    });

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        sources: { osm: { type: "raster", tiles: ["https://tile.openstreetmap.org/{z}/{x}/{y}.png"], tileSize: 256, attribution: "© OpenStreetMap contributors" } },
        layers: [{ id: "osm", type: "raster", source: "osm" }],
      },
      center: [37.93, 26.62], // Al Ula
      zoom: 12,
    });
    map.addControl(new maplibregl.NavigationControl());

    let points = []; // [{lngLat, marker}]
    const routeBtn = document.getElementById("routeBtn");
    const status = document.getElementById("status");

    map.on("click", (e) => {
      if (points.length >= 2) return;
      const marker = new maplibregl.Marker({ color: points.length === 0 ? "#43d17c" : "#e05555" })
        .setLngLat(e.lngLat).addTo(map);
      points.push({ lngLat: e.lngLat, marker });
      routeBtn.disabled = points.length !== 2;
      status.textContent = points.length === 1 ? "Now click the destination." : "";
    });

    document.getElementById("clearBtn").onclick = () => {
      points.forEach((p) => p.marker.remove());
      points = [];
      routeBtn.disabled = true;
      status.textContent = "";
      if (map.getLayer("route")) { map.removeLayer("route"); map.removeSource("route"); }
    };

    routeBtn.onclick = async () => {
      const [a, b] = points;
      const engine = document.getElementById("engine").value;
      const algorithm = document.getElementById("algorithm").value;
      status.textContent = "Routing…";
      const url = `${API}/route?from=${a.lngLat.lat},${a.lngLat.lng}&to=${b.lngLat.lat},${b.lngLat.lng}&engine=${engine}&algorithm=${algorithm}`;
      const res = await fetch(url);
      const data = await res.json();
      if (!res.ok) { status.textContent = data.error || "Routing failed"; return; }
      status.textContent = "";
      const rows = [
        ["Engine", data.engine],
        ["Distance", (data.distanceMeters / 1000).toFixed(2) + " km"],
        ["Duration", Math.round(data.durationSeconds / 60) + " min (@40 km/h)"],
        ["Route nodes", data.nodeCount],
        ["Nodes explored", data.visitedCount === -1 ? "internal" : data.visitedCount],
        ["Compute", data.computeMs + " ms"],
        ["Cache", data.cached ? "HIT (" + data.cacheBackend + ")" : "miss (" + data.cacheBackend + ")"],
      ];
      document.getElementById("result").innerHTML = rows.map((r) => `<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("");
      const geojson = { type: "Feature", geometry: data.geometry };
      if (map.getLayer("route")) { map.removeLayer("route"); map.removeSource("route"); }
      map.addSource("route", { type: "geojson", data: geojson });
      map.addLayer({ id: "route", type: "line", source: "route",
        paint: { "line-color": "#e8a33d", "line-width": 5, "line-opacity": 0.9 } });
      const coords = data.geometry.coordinates;
      const bounds = coords.reduce((bb, c) => bb.extend(c), new maplibregl.LngLatBounds(coords[0], coords[0]));
      map.fitBounds(bounds, { padding: 60 });
    };
  </script>
</body>
</html>
